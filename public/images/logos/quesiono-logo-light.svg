<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" fill="none">
  <!-- Circular Q icon mark -->
  <circle cx="36" cy="36" r="32" stroke="#F0E7D5" stroke-width="2"/>
  <circle cx="36" cy="36" r="24" stroke="#F0E7D5" stroke-width="0.75" stroke-opacity="0.35"/>
  <text x="36" y="50" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-style="italic" font-weight="700" fill="#F0E7D5" text-anchor="middle">Q</text>

  <!-- Wordmark -->
  <text x="84" y="42" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-style="italic" font-weight="700" fill="#F0E7D5" letter-spacing="0.5">Quesiono</text>

  <!-- Divider line -->
